<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimVerse AI - Sign Up</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1020;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
width:90%;
max-width:400px;
background:#161d35;
padding:30px;
border-radius:15px;
text-align:center;
}
h1{
color:#8b5cf6;
margin-bottom:10px;
}
p{
color:#ccc;
}
input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
}
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:#8b5cf6;
color:white;
font-size:18px;
cursor:pointer;
}
a{
color:#8b5cf6;
text-decoration:none;
}
</style>
</head>
<body>
<div class="box">
<h1>🚀 AnimVerse AI</h1>
<p>Create your account</p>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">
<button>Create Account</button>
<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>
</div>
</body>
</html>
