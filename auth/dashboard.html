<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AnimVerse AI</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: #0f0f1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #a855f7;
        }
        button {
            background: linear-gradient(45deg, #a855f7, #ec4899);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome to AnimVerse AI Dashboard</h1>
    <p>Aap logged in ho! Email: <span id="user-email">Loading...</span></p>
    
    <h2>🚀 Aage Kya Kar Sakte Ho</h2>
    <p>Abhi yeh page simple hai. Baad mein yahan aapki saari images, videos aur history dikhegi.</p>
    
    <button onclick="logout()">Logout Karo</button>

    <!-- Yeh script login check karta hai -->
    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '../index.html';
            } else {
                document.getElementById('user-email').textContent = user.email;
            }
        });

        function logout() {
            window.location.href = '../index.html';
        }
    </script>

</body>
</html>
