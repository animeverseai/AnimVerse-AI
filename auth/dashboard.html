<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimVerse AI Dashboard</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1020;
color:white;
}
header{
background:#161d35;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-size:24px;
font-weight:bold;
color:#8b5cf6;
}
.container{
padding:20px;
}
.card{
background:#161d35;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
button{
padding:12px 20px;
background:#8b5cf6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}
</style>
</head>
<body>
<header>
<div class="logo">🚀 AnimVerse AI</div>
<button>Logout</button>
</header>
<div class="container">
<div class="card">
<h2>Welcome!</h2>
<p>Your account is ready.</p>
</div>
<div class="card">
<h3>Credits</h3>
<p>Free Credits: 5</p>
</div>
<div class="card">
<h3>AI Tools</h3>
<button>AI Chat</button>
<button>AI Image</button>
<button>AI Video</button>
</div>
</div>
</body>
</html>
