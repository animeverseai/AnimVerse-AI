<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimVerse AI Dashboard</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1020;
color:white;
}
header{
background:#161d35;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-size:24px;
font-weight:bold;
color:#8b5cf6;
}
.container{
padding:20px;
}
.card{
background:#161d35;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
button{
padding:12px 20px;
background:#8b5cf6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}
textarea, select{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}
</style>
</head>
<body>
<header>
<div class="logo">🚀 AnimVerse AI</div>
<button id="logoutBtn">Logout</button>
</header>
<div class="container">

<div class="card">
<h2>Welcome!</h2>
<p>Your account is ready.</p>
</div>

<div class="card">
<h3>Credits</h3>
<p>Free Credits: 5</p>
</div>

<div class="card">
<h3>🎬 AI Video Generator</h3>
<div style="text-align:center; padding:20px; background:#1e2a4a; border-radius:10px;">
  <h3>🚧 Coming Soon</h3>
  <p style="color:#bdbdbd; margin-top:10px;">AI Video Generator is launching soon! Try our AI Image Generator below 🎨</p>
</div>
</div>

<div class="card">
<h3>🖼 AI Image Generator</h3>
<textarea id="imagePrompt" placeholder="Describe your image..."></textarea>

<select id="imageStyle">
  <option value="">🎨 Select Style</option>
  <option value="Realistic">Realistic</option>
  <option value="Anime">Anime</option>
  <option value="Studio Ghibli">Studio Ghibli</option>
  <option value="Pixar">Pixar</option>
  <option value="Cyberpunk">Cyberpunk</option>
  <option value="Fantasy">Fantasy</option>
</select>

<select id="imageSize">
  <option value="512">⚡ Fast (512×512)</option>
  <option value="768">🌟 Balanced (768×768)</option>
  <option value="1024" selected>💎 HD (1024×1024)</option>
</select>

<button id="generateBtn" onclick="generateImage()">🎨 Generate Image</button>

<div id="loading" style="display:none;text-align:center;margin-top:20px;">
  <p>Generating Image...</p>
</div>

<div id="imageResult" style="margin-top:20px;text-align:center;"></div>
</div>

</div>

<script type="module" src="../js/auth.js"></script>
<script src="../js/image.js"></script>

</body>
</html>
